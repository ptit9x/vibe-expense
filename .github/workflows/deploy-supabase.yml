name: Deploy Supabase Schema

on:
  push:
    branches: [main]
    paths:
      - 'supabase/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - name: Debug Secret Visibility
        run: |
          if [ -z "${{ secrets.PROJECT_REF }}" ]; then
            echo "SECRET IS EMPTY"
            exit 1
          else
            echo "Secret length is: ${#VALUE}"
          fi
        env:
          VALUE: ${{ secrets.PROJECT_REF }}

      - uses: supabase/setup-cli@v1
        with:
          supabase-version: latest

      - name: Link project
        # Added the password flag to prevent the CLI from hanging
        run: supabase link --project-ref ${{ secrets.PROJECT_REF }} -p ${{ secrets.POSTGRES_PASSWORD }}

      - name: Push migrations
        run: supabase db push --password ${{ secrets.POSTGRES_PASSWORD }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
