name: React Doctor

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  doctor:
    name: Run React Doctor
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci

      - name: Run React Doctor
        run: npm run doctor
